<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Homework Helper</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1a2e; --paper: #faf7f2; --cream: #ede8dc;
    --accent: #e8673a; --accent2: #4a90b8;
    --hint-bg: #fffdf0; --hint-border: #efc84a;
    --answer-bg: #f0f7ff; --answer-border: #4a90b8;
    --muted: #8a8070; --surface: #fff;
    --card-shadow: 0 2px 16px rgba(26,26,46,0.09), 0 1px 3px rgba(26,26,46,0.06);
  }
  [data-theme="dark"] {
    --ink: #e8e4dc; --paper: #16151f; --cream: #2a2838;
    --accent: #f07848; --accent2: #5ba8d4;
    --hint-bg: #1e1c10; --hint-border: #7a6010;
    --answer-bg: #0e1a28; --answer-border: #2a6090;
    --muted: #7a7468; --surface: #201e2c;
    --card-shadow: 0 2px 16px rgba(0,0,0,0.3);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--paper); color: var(--ink);
    font-family: 'DM Sans', sans-serif; min-height: 100vh;
    transition: background 0.3s, color 0.3s;
    background-image:
      radial-gradient(ellipse at 85% 5%, rgba(232,103,58,0.07) 0%, transparent 55%),
      radial-gradient(ellipse at 5% 95%, rgba(74,144,184,0.08) 0%, transparent 50%);
  }

  /* Header */
  header {
    position: sticky; top: 0; z-index: 10;
    background: color-mix(in srgb, var(--paper) 88%, transparent);
    backdrop-filter: blur(14px);
    border-bottom: 1.5px solid var(--cream);
    padding: 0.85rem 1.6rem;
    display: flex; align-items: center; gap: 0.9rem;
  }
  .logo {
    width: 38px; height: 38px; background: var(--ink);
    border-radius: 10px; display: flex; align-items: center; justify-content: center;
    font-family: 'Fraunces', serif; font-size: 1.3rem;
    color: var(--paper); font-style: italic; flex-shrink: 0;
    transition: background 0.3s;
  }
  .logo-text h1 { font-family: 'Fraunces', serif; font-size: 1.3rem; font-weight: 700; line-height: 1; }
  .logo-text h1 em { color: var(--accent); font-style: italic; }
  .logo-text p { font-family: 'DM Mono', monospace; font-size: 0.64rem; color: var(--muted); margin-top: 2px; }
  .header-right { margin-left: auto; display: flex; align-items: center; gap: 0.6rem; }

  /* Dark mode toggle */
  .theme-btn {
    width: 34px; height: 34px; border-radius: 8px;
    border: 1.5px solid var(--cream); background: var(--surface);
    cursor: pointer; font-size: 1rem; display: flex; align-items: center; justify-content: center;
    transition: all 0.15s; color: var(--ink);
  }
  .theme-btn:hover { border-color: var(--accent); }

  /* Container */
  .container { max-width: 720px; margin: 0 auto; padding: 1.8rem 1.3rem 5rem; }

  /* Subject pills */
  .subject-row {
    display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1.1rem;
  }
  .subject-pill {
    padding: 5px 14px; border-radius: 20px;
    border: 1.5px solid var(--cream); background: var(--surface);
    font-size: 0.78rem; font-weight: 500; color: var(--muted);
    cursor: pointer; transition: all 0.15s; font-family: 'DM Sans', sans-serif;
    user-select: none;
  }
  .subject-pill:hover { border-color: var(--accent2); color: var(--accent2); }
  .subject-pill.active {
    background: var(--accent2); border-color: var(--accent2);
    color: #fff; font-weight: 600;
  }

  /* Input card */
  .input-card {
    background: var(--surface); border-radius: 20px;
    border: 2px solid var(--cream); box-shadow: var(--card-shadow);
    overflow: hidden; margin-bottom: 1.3rem;
    transition: border-color 0.25s, box-shadow 0.25s, background 0.3s;
  }
  .input-card:focus-within { border-color: var(--accent2); }
  .input-card.paste-flash { animation: flashFade 0.6s ease forwards; }
  @keyframes flashFade {
    0%   { border-color: var(--accent2); box-shadow: 0 0 0 4px rgba(74,144,184,0.2); }
    100% { border-color: var(--cream); box-shadow: var(--card-shadow); }
  }

  textarea {
    width: 100%; min-height: 95px; border: none; outline: none; resize: vertical;
    padding: 1.1rem 1.2rem 0;
    font-family: 'DM Sans', sans-serif; font-size: 0.96rem;
    color: var(--ink); background: transparent; line-height: 1.65; display: block;
    transition: color 0.3s;
  }
  textarea::placeholder { color: var(--muted); opacity: 0.5; }

  .paste-tip {
    padding: 0.25rem 1.2rem 0;
    font-family: 'DM Mono', monospace; font-size: 0.64rem; color: var(--muted); opacity: 0.6;
  }

  .upload-row {
    display: flex; align-items: center; gap: 0.55rem;
    padding: 0.65rem 1.2rem; border-top: 1.5px dashed var(--cream);
    margin-top: 0.55rem; flex-wrap: wrap;
  }
  .upload-btn {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 5px 13px; border-radius: 8px;
    border: 1.5px solid var(--cream); background: var(--paper);
    font-family: 'DM Sans', sans-serif; font-size: 0.78rem; font-weight: 500;
    color: var(--muted); cursor: pointer; transition: all 0.15s; flex-shrink: 0;
  }
  .upload-btn:hover { border-color: var(--accent); color: var(--accent); }
  input[type="file"] { display: none; }

  .thumb-wrap { position: relative; width: 44px; height: 44px; flex-shrink: 0; }
  .thumb-wrap img {
    width: 100%; height: 100%; object-fit: cover;
    border-radius: 8px; border: 2px solid var(--cream); display: block;
    animation: popIn 0.22s cubic-bezier(.34,1.56,.64,1);
  }
  @keyframes popIn { from{transform:scale(0.6);opacity:0} to{transform:scale(1);opacity:1} }
  .thumb-rm {
    position: absolute; top: -5px; right: -5px;
    width: 16px; height: 16px; background: var(--ink); color: var(--paper);
    border: none; border-radius: 50%; font-size: 9px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }

  .action-row { display: flex; justify-content: space-between; align-items: center; padding: 0 1.2rem 0.9rem; }
  .char-count { font-family: 'DM Mono', monospace; font-size: 0.68rem; color: var(--muted); opacity: 0.6; }

  .ask-btn {
    background: var(--ink); color: var(--paper); border: none;
    padding: 9px 26px; border-radius: 10px;
    font-family: 'DM Sans', sans-serif; font-size: 0.92rem; font-weight: 600;
    cursor: pointer; display: flex; align-items: center; gap: 7px;
    transition: background 0.15s, transform 0.12s, box-shadow 0.15s;
    box-shadow: 0 2px 8px rgba(26,26,46,0.18);
  }
  .ask-btn:hover:not(:disabled) { background: var(--accent); transform: translateY(-1px); box-shadow: 0 4px 14px rgba(232,103,58,0.3); }
  .ask-btn:active:not(:disabled) { transform: translateY(0); }
  .ask-btn:disabled { background: var(--muted); cursor: not-allowed; box-shadow: none; opacity: 0.5; }

  /* Dots */
  .dots { display: inline-flex; gap: 4px; align-items: center; }
  .dots span { width: 5px; height: 5px; border-radius: 50%; background: rgba(255,255,255,0.85); animation: dotB 1.1s infinite ease-in-out; }
  .dots span:nth-child(2) { animation-delay: 0.18s; }
  .dots span:nth-child(3) { animation-delay: 0.36s; }
  @keyframes dotB { 0%,80%,100%{transform:scale(0.65);opacity:0.4} 40%{transform:scale(1.1);opacity:1} }

  /* Response cards */
  .response-card {
    border-radius: 16px; padding: 1.25rem 1.4rem; margin-bottom: 1rem;
    animation: slideUp 0.38s cubic-bezier(.22,.68,0,1.2) both;
    position: relative;
  }
  @keyframes slideUp { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }
  .hints-card { background: var(--hint-bg); border: 1.5px solid var(--hint-border); }
  .answer-card { background: var(--answer-bg); border: 1.5px solid var(--answer-border); }

  .card-label {
    font-family: 'DM Mono', monospace; font-size: 0.68rem; text-transform: uppercase;
    letter-spacing: 0.13em; font-weight: 500; margin-bottom: 0.6rem;
    display: flex; align-items: center; justify-content: space-between;
  }
  .hints-card .card-label { color: #9a6e00; }
  .answer-card .card-label { color: #1a5f8a; }
  [data-theme="dark"] .hints-card .card-label { color: #c8a040; }
  [data-theme="dark"] .answer-card .card-label { color: #5ab0e0; }

  .card-body { font-size: 0.95rem; line-height: 1.82; color: var(--ink); }

  /* Copy button */
  .copy-btn {
    padding: 3px 10px; border-radius: 6px; font-size: 0.7rem; font-weight: 500;
    border: 1px solid currentColor; background: transparent; cursor: pointer;
    font-family: 'DM Mono', monospace; opacity: 0.7; transition: opacity 0.15s;
    color: inherit;
  }
  .copy-btn:hover { opacity: 1; }

  /* Shimmer */
  .shimmer {
    height: 13px; border-radius: 5px; margin-bottom: 9px;
    background: linear-gradient(90deg, var(--cream) 25%, color-mix(in srgb, var(--cream) 60%, white) 50%, var(--cream) 75%);
    background-size: 200% 100%; animation: shimmer 1.4s infinite;
  }
  @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

  /* Reveal btn */
  .reveal-btn {
    display: inline-flex; align-items: center; gap: 6px;
    margin-top: 1rem; padding: 7px 18px; border-radius: 9px;
    border: 1.5px solid var(--hint-border); background: transparent;
    font-family: 'DM Sans', sans-serif; font-size: 0.82rem; font-weight: 600;
    color: #9a6e00; cursor: pointer; transition: all 0.15s;
  }
  .reveal-btn:hover { background: rgba(239,200,74,0.15); }
  [data-theme="dark"] .reveal-btn { color: #c8a040; }

  /* Error */
  .error-box {
    background: #fff5f5; border: 1.5px solid #f87171; border-radius: 12px;
    padding: 0.9rem 1.1rem; font-size: 0.88rem; color: #b91c1c; margin-bottom: 1rem;
    animation: slideUp 0.3s ease both;
  }
  [data-theme="dark"] .error-box { background: #2a1010; color: #f87171; border-color: #7a2020; }

  /* Difficulty badge */
  .difficulty-row { display: flex; gap: 0.5rem; align-items: center; margin-bottom: 1rem; }
  .diff-label { font-family: 'DM Mono', monospace; font-size: 0.68rem; color: var(--muted); }
  .diff-badge {
    padding: 3px 11px; border-radius: 12px; font-size: 0.72rem; font-weight: 600;
    font-family: 'DM Mono', monospace; border: none; cursor: default;
  }
  .diff-easy   { background: #d4f4e0; color: #1a7a3a; }
  .diff-medium { background: #fff0cc; color: #7a5500; }
  .diff-hard   { background: #ffe0d4; color: #8a2000; }
  [data-theme="dark"] .diff-easy   { background: #0a2a18; color: #4ada80; }
  [data-theme="dark"] .diff-medium { background: #2a2000; color: #d4a020; }
  [data-theme="dark"] .diff-hard   { background: #2a0e08; color: #f07050; }

  /* Drag overlay */
  #drag-overlay {
    display: none; position: fixed; inset: 0; z-index: 200;
    background: rgba(74,144,184,0.1); border: 3px dashed var(--accent2);
    align-items: center; justify-content: center;
    font-family: 'Fraunces', serif; font-size: 1.4rem;
    color: var(--accent2); font-style: italic; pointer-events: none;
  }
  #drag-overlay.show { display: flex; }

  /* Confetti canvas */
  #confetti-canvas {
    position: fixed; inset: 0; pointer-events: none; z-index: 999;
  }

  @media(max-width:500px){
    header { padding: 0.75rem 1rem; }
    .container { padding: 1.2rem 0.8rem 4rem; }
    .response-card { padding: 1rem 1.1rem; }
  }
</style>
</head>
<body>

<canvas id="confetti-canvas"></canvas>

<header>
  <div class="logo">h</div>
  <div class="logo-text">
    <h1>Homework <em>Helper</em></h1>
    <p>hints first · then the answer</p>
  </div>
  <div class="header-right">
    <button class="theme-btn" id="theme-btn" title="Toggle dark mode">🌙</button>
  </div>
</header>

<div class="container">

  <!-- Subject selector -->
  <div class="subject-row" id="subject-row">
    <span class="subject-pill active" data-subject="any">✨ Any</span>
    <span class="subject-pill" data-subject="Math">📐 Math</span>
    <span class="subject-pill" data-subject="Science">🔬 Science</span>
    <span class="subject-pill" data-subject="English">📖 English</span>
    <span class="subject-pill" data-subject="History">🏛️ History</span>
    <span class="subject-pill" data-subject="Coding">💻 Coding</span>
  </div>

  <!-- Input card -->
  <div class="input-card" id="input-card">
    <textarea id="q-input" placeholder="Type your question… or paste / drag an image in!" rows="4"></textarea>
    <div class="paste-tip">💡 Ctrl+V / ⌘+V to paste an image · Ctrl+Enter to submit</div>
    <div class="upload-row">
      <label class="upload-btn" for="file-input">📎 Upload image</label>
      <input type="file" id="file-input" accept="image/*" multiple>
      <div id="thumbs"></div>
    </div>
    <div class="action-row">
      <span class="char-count" id="char-count">0 chars</span>
      <button class="ask-btn" id="ask-btn" disabled>⚡ Get Help</button>
    </div>
  </div>

  <!-- Difficulty -->
  <div class="difficulty-row" id="diff-row" style="display:none;">
    <span class="diff-label">difficulty:</span>
    <span class="diff-badge" id="diff-badge"></span>
  </div>

  <!-- Responses -->
  <div id="error-area"></div>
  <div id="hints-area"></div>
  <div id="answer-area"></div>

</div>

<div id="drag-overlay">📎 Drop image here</div>

<script>
  // ── State ────────────────────────────────────────────────────────
  let uploadedImages = [];
  let selectedSubject = 'any';

  const qInput   = document.getElementById('q-input');
  const askBtn   = document.getElementById('ask-btn');
  const thumbs   = document.getElementById('thumbs');
  const fileIn   = document.getElementById('file-input');
  const card     = document.getElementById('input-card');
  const dragOv   = document.getElementById('drag-overlay');
  const errorA   = document.getElementById('error-area');
  const hintsA   = document.getElementById('hints-area');
  const answerA  = document.getElementById('answer-area');
  const diffRow  = document.getElementById('diff-row');
  const diffBadge= document.getElementById('diff-badge');
  const charCount= document.getElementById('char-count');

  // ── Dark mode ────────────────────────────────────────────────────
  const themeBtn = document.getElementById('theme-btn');
  const saved = localStorage.getItem('theme') || 'light';
  document.documentElement.setAttribute('data-theme', saved);
  themeBtn.textContent = saved === 'dark' ? '☀️' : '🌙';
  themeBtn.addEventListener('click', () => {
    const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('theme', next);
    themeBtn.textContent = next === 'dark' ? '☀️' : '🌙';
  });

  // ── Subject pills ────────────────────────────────────────────────
  document.querySelectorAll('.subject-pill').forEach(pill => {
    pill.addEventListener('click', () => {
      document.querySelectorAll('.subject-pill').forEach(p => p.classList.remove('active'));
      pill.classList.add('active');
      selectedSubject = pill.dataset.subject;
    });
  });

  // ── Char counter ─────────────────────────────────────────────────
  qInput.addEventListener('input', () => {
    const n = qInput.value.length;
    charCount.textContent = n ? `${n} chars` : '0 chars';
    updateBtn();
  });

  function updateBtn() {
    askBtn.disabled = !qInput.value.trim() && uploadedImages.length === 0;
  }

  // ── Image reading ────────────────────────────────────────────────
  function readFile(file) {
    if (!file.type.startsWith('image/')) return;
    const reader = new FileReader();
    reader.onload = e => {
      uploadedImages.push({
        dataUrl: e.target.result,
        base64: e.target.result.split(',')[1],
        mediaType: file.type || 'image/jpeg',
        name: file.name
      });
      renderThumbs(); updateBtn();
    };
    reader.readAsDataURL(file);
  }

  function renderThumbs() {
    thumbs.innerHTML = '';
    uploadedImages.forEach((img, i) => {
      const w = document.createElement('div');
      w.className = 'thumb-wrap';
      w.innerHTML = `<img src="${img.dataUrl}" alt=""><button class="thumb-rm" data-i="${i}">✕</button>`;
      thumbs.appendChild(w);
    });
    thumbs.querySelectorAll('.thumb-rm').forEach(b => b.addEventListener('click', () => {
      uploadedImages.splice(+b.dataset.i, 1); renderThumbs(); updateBtn();
    }));
  }

  fileIn.addEventListener('change', e => { Array.from(e.target.files).forEach(readFile); fileIn.value=''; });

  // ── Drag & drop ──────────────────────────────────────────────────
  document.addEventListener('dragover', e => { e.preventDefault(); dragOv.classList.add('show'); });
  document.addEventListener('dragleave', e => { if (!e.relatedTarget) dragOv.classList.remove('show'); });
  document.addEventListener('drop', e => {
    e.preventDefault(); dragOv.classList.remove('show');
    Array.from(e.dataTransfer.files).forEach(readFile);
  });

  // ── Paste ────────────────────────────────────────────────────────
  document.addEventListener('paste', e => {
    let found = false;
    for (const item of (e.clipboardData?.items || [])) {
      if (item.type.startsWith('image/')) {
        e.preventDefault(); found = true;
        const ext = item.type.split('/')[1] || 'png';
        readFile(new File([item.getAsFile()], `pasted.${ext}`, { type: item.type }));
      }
    }
    if (found) { card.classList.remove('paste-flash'); void card.offsetWidth; card.classList.add('paste-flash'); }
  });

  qInput.addEventListener('keydown', e => { if (e.key==='Enter' && (e.ctrlKey||e.metaKey)) askBtn.click(); });

  // ── Ask ──────────────────────────────────────────────────────────
  askBtn.addEventListener('click', async () => {
    const q = qInput.value.trim();
    if (!q && uploadedImages.length === 0) return;

    askBtn.disabled = true;
    askBtn.innerHTML = '<span class="dots"><span></span><span></span><span></span></span> Thinking…';
    errorA.innerHTML = '';
    hintsA.innerHTML = shimmerCard('hints');
    answerA.innerHTML = '';
    diffRow.style.display = 'none';

    try {
      const res = await fetch('/api/ask', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          question: q,
          subject: selectedSubject,
          images: uploadedImages.map(i => ({ base64: i.base64, mediaType: i.mediaType }))
        })
      });

      const data = await res.json();
      if (!res.ok) throw new Error(data.error || `Error ${res.status}`);

      const { hints, answer, difficulty } = parseResponse(data.text || '');

      // Show difficulty badge
      if (difficulty) {
        const level = difficulty.toLowerCase();
        diffBadge.textContent = difficulty;
        diffBadge.className = 'diff-badge diff-' + (level.includes('easy') ? 'easy' : level.includes('hard') ? 'hard' : 'medium');
        diffRow.style.display = 'flex';
      }

      // Hints card
      hintsA.innerHTML = `
        <div class="response-card hints-card">
          <div class="card-label">
            <span>💡 Hints — try these first!</span>
            <button class="copy-btn" data-text="${escAttr(hints)}">copy</button>
          </div>
          <div class="card-body">${cleanMarkdown(hints)}</div>
          ${answer ? `<button class="reveal-btn" id="reveal-btn">Show full answer ↓</button>` : ''}
        </div>`;

      hintsA.querySelector('.copy-btn')?.addEventListener('click', function() {
        navigator.clipboard.writeText(this.dataset.text).then(() => { this.textContent = 'copied!'; setTimeout(() => this.textContent = 'copy', 1500); });
      });

      if (answer) {
        document.getElementById('reveal-btn')?.addEventListener('click', () => {
          document.getElementById('reveal-btn').remove();
          answerA.innerHTML = `
            <div class="response-card answer-card">
              <div class="card-label">
                <span>✅ Full Answer</span>
                <button class="copy-btn" data-text="${escAttr(answer)}">copy</button>
              </div>
              <div class="card-body">${cleanMarkdown(answer)}</div>
            </div>`;
          answerA.querySelector('.copy-btn')?.addEventListener('click', function() {
            navigator.clipboard.writeText(this.dataset.text).then(() => { this.textContent = 'copied!'; setTimeout(() => this.textContent = 'copy', 1500); });
          });
          launchConfetti();
          answerA.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        });
      }

    } catch (err) {
      hintsA.innerHTML = '';
      errorA.innerHTML = `<div class="error-box">⚠️ ${esc(err.message)}</div>`;
    }

    askBtn.disabled = false;
    askBtn.innerHTML = '⚡ Get Help';
    updateBtn();
  });

  // ── Helpers ──────────────────────────────────────────────────────
  function shimmerCard(type) {
    const cls = type === 'hints' ? 'hints-card' : 'answer-card';
    const label = type === 'hints' ? '💡 Hints — try these first!' : '✅ Full Answer';
    return `<div class="response-card ${cls}">
      <div class="card-label">${label}</div>
      <div class="shimmer" style="width:88%"></div>
      <div class="shimmer" style="width:72%"></div>
      <div class="shimmer" style="width:80%"></div>
    </div>`;
  }

  function parseResponse(text) {
    const hm = text.match(/---HINTS---\s*([\s\S]*?)(?=---ANSWER---|---DIFFICULTY---|$)/i);
    const am = text.match(/---ANSWER---\s*([\s\S]*?)(?=---DIFFICULTY---|$)/i);
    const dm = text.match(/---DIFFICULTY---\s*(.+)/i);
    return {
      hints: hm ? hm[1].trim() : text,
      answer: am ? am[1].trim() : '',
      difficulty: dm ? dm[1].trim() : ''
    };
  }

  function esc(s) {
    return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }
  function escAttr(s) {
    return String(s).replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }

  function cleanMarkdown(s) {
    let t = String(s);
    t = t.replace(/\$\$([^$]+)\$\$/g, '$1');
    t = t.replace(/\$([^$\n]+)\$/g, '$1');
    t = t.replace(/\\\[([^\]]+)\\\]/g, '$1');
    t = t.replace(/\\\(([^)]+)\\\)/g, '$1');
    t = t.replace(/\\text\{([^}]+)\}/g, '$1');
    t = t.replace(/\\frac\{([^}]+)\}\{([^}]+)\}/g, '($1)/($2)');
    t = t.replace(/\\times/g,'×').replace(/\\div/g,'÷').replace(/\\cdot/g,'·');
    t = t.replace(/\\approx/g,'≈').replace(/\\neq/g,'≠').replace(/\\leq/g,'≤').replace(/\\geq/g,'≥');
    t = t.replace(/\\sqrt\{([^}]+)\}/g,'√($1)');
    t = t.replace(/\\\w+\{([^}]*)\}/g,'$1').replace(/\\\w+/g,'');
    t = t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    t = t.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/__(.+?)__/g,'<strong>$1</strong>');
    t = t.replace(/\*([^*\n]+)\*/g,'<em>$1</em>').replace(/_([^_\n]+)_/g,'<em>$1</em>');
    t = t.replace(/`([^`]+)`/g,'<code style="background:color-mix(in srgb,var(--cream) 80%,transparent);padding:1px 5px;border-radius:4px;font-family:monospace;font-size:0.88em;">$1</code>');
    t = t.replace(/^#{1,3}\s+(.+)$/gm,'<strong>$1</strong>');
    t = t.replace(/^(\d+)\.\s+(.+)$/gm,'<div style="margin:5px 0;"><span style="font-weight:700;color:var(--accent2);min-width:1.4em;display:inline-block;">$1.</span> $2</div>');
    t = t.replace(/^[\*\-]\s+(.+)$/gm,'<div style="margin:4px 0;padding-left:1em;">• $1</div>');
    t = t.replace(/\n/g,'<br>');
    return t;
  }

  // ── Confetti ─────────────────────────────────────────────────────
  function launchConfetti() {
    const canvas = document.getElementById('confetti-canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    const pieces = Array.from({length: 80}, () => ({
      x: Math.random() * canvas.width,
      y: -10 - Math.random() * 100,
      r: 4 + Math.random() * 6,
      d: 2 + Math.random() * 3,
      color: ['#e8673a','#4a90b8','#efc84a','#6ac46a','#e870b8'][Math.floor(Math.random()*5)],
      tilt: Math.random() * 10 - 5,
      tiltAngle: 0,
      tiltSpeed: 0.05 + Math.random() * 0.1
    }));
    let frame = 0;
    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      pieces.forEach(p => {
        p.tiltAngle += p.tiltSpeed;
        p.y += p.d;
        p.tilt = Math.sin(p.tiltAngle) * 12;
        ctx.beginPath();
        ctx.lineWidth = p.r / 2;
        ctx.strokeStyle = p.color;
        ctx.moveTo(p.x + p.tilt + p.r/4, p.y);
        ctx.lineTo(p.x + p.tilt, p.y + p.tilt + p.r/4);
        ctx.stroke();
      });
      frame++;
      if (frame < 120) requestAnimationFrame(draw);
      else ctx.clearRect(0, 0, canvas.width, canvas.height);
    }
    draw();
  }
</script>
